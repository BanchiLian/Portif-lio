<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusWeather iOS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sunny: linear-gradient(180deg, #4A90E2 0%, #87CEEB 100%);
            --bg-night: linear-gradient(180deg, #1A2A6C 0%, #2A4858 100%);
            --card-bg: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        .iphone-container {
            width: 100%; max-width: 400px; height: 100vh;
            position: relative; overflow: hidden; background: var(--bg-sunny);
            transition: background 1s ease;
        }

        /* VISTAS */
        #detailsView {
            position: absolute; width: 100%; height: 100%; padding: 20px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto; z-index: 1;
        }

        #listView {
            position: absolute; width: 100%; height: 100%; background: #000;
            padding: 20px; padding-top: 60px; transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2; overflow-y: auto;
        }

        .iphone-container.show-list #detailsView { transform: translateX(-100%); }
        .iphone-container.show-list #listView { transform: translateX(0); }

        /* HEADER DETALHES */
        .main-header { text-align: center; margin-top: 60px; margin-bottom: 30px; }
        .city-name { font-size: 34px; font-weight: 400; }
        .main-temp { font-size: 90px; font-weight: 200; margin: 5px 0; }
        .condition-text { font-size: 20px; opacity: 0.8; text-transform: capitalize; }

        /* WIDGETS */
        .widgets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 120px; }
        .widget { 
            background: var(--card-bg); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; aspect-ratio: 1/1;
        }
        .widget-header { font-size: 11px; font-weight: 600; opacity: 0.5; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
        .widget-value { font-size: 28px; font-weight: 500; margin-top: 5px; }
        .widget-desc { font-size: 12px; margin-top: auto; opacity: 0.8; }

        /* TAB BAR (iOS STYLE) */
        .tab-bar {
            position: absolute; bottom: 0; width: 100%; height: 85px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(25px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-top: 0.5px solid rgba(255,255,255,0.2); z-index: 10;
        }
        .nav-icon { cursor: pointer; background: none; border: none; font-size: 24px; color: #fff; opacity: 0.9; transition: 0.2s; }
        .nav-icon:active { transform: scale(0.9); }

        /* LISTA DE CIDADES */
        .list-header { font-size: 32px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .city-card {
            background: var(--bg-sunny); border-radius: 20px; padding: 15px 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; position: relative; overflow: hidden;
            transition: transform 0.2s; cursor: pointer;
        }
        .city-card h2 { font-size: 22px; font-weight: 600; }
        .city-card p { font-size: 12px; opacity: 0.9; }
        .city-card .temp { font-size: 40px; font-weight: 300; }

        /* BOTÃO EXCLUIR */
        .delete-btn {
            background: #ff3b30; color: white; border: none; 
            border-radius: 50%; width: 25px; height: 25px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: absolute; top: 10px; left: 10px; z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .search-bar {
            background: rgba(255,255,255,0.15); padding: 12px;
            border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center;
        }
        .search-bar input { background: none; border: none; color: #fff; width: 100%; margin-left: 10px; outline: none; font-size: 16px; }

        .funny-quote-box {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            margin-bottom: 20px; font-size: 14px; text-align: center; font-style: italic;
        }
    </style>
</head>
<body>

    <div class="iphone-container" id="container">
        
        <div id="detailsView">
            <div class="main-header">
                <h1 id="detCity">Vinhedo</h1>
                <div class="main-temp" id="detTemp">--°</div>
                <div class="condition-text" id="detCond">Carregando...</div>
                <div style="font-size: 18px; margin-top: 5px;">Mín: <span id="detMin">--</span> Máx: <span id="detMax">--</span></div>
            </div>

            <div class="funny-quote-box" id="detQuote">"Aguardando dados reais..."</div>

            <div class="widgets-grid">
                <div class="widget"><div class="widget-header">🌡️ Sensação</div><div class="widget-value" id="detFeels">--°</div><div class="widget-desc">Como você realmente sente.</div></div>
                <div class="widget"><div class="widget-header">☀️ Índice UV</div><div class="widget-value" id="detUV">4</div><div class="widget-desc">Moderado. Use protetor.</div></div>
                <div class="widget"><div class="widget-header">💨 Vento</div><div class="widget-value" id="detWind">-- <small>km/h</small></div><div class="widget-desc" id="detWindDir">Direção: --</div></div>
                <div class="widget"><div class="widget-header">💧 Umidade</div><div class="widget-value" id="detHum">--%</div><div class="widget-desc">A umidade está estável.</div></div>
            </div>

            <div class="tab-bar">
                <button class="nav-icon" title="Mapa">🗺️</button>
                <div style="display: flex; gap: 5px;">
                    <div style="width: 6px; height: 6px; background: #fff; border-radius: 50%;"></div>
                    <div style="width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%;"></div>
                </div>
                <button class="nav-icon" onclick="toggleView()">☰</button>
            </div>
        </div>

        <div id="listView">
            <div class="list-header">Clima <span style="font-size: 16px; color: #007AFF; cursor:pointer;" onclick="toggleView()">Pronto</span></div>
            
            <div class="search-bar">
                <span style="opacity: 0.5;">🔍</span>
                <input type="text" id="citySearch" placeholder="Pesquisar cidade">
            </div>

            <div id="citiesListContainer"></div>
        </div>

    </div>

    <script>
        const OWM_API_KEY = 'SUA_CHAVE_API_AQUI'; 
        let savedCities = JSON.parse(localStorage.getItem('weatherCities')) || ['Vinhedo', 'São Paulo', 'Rio de Janeiro'];

        const funnyQuotes = {
            ensolarado: ["Passe protetor até na alma! 🥵", "Hoje o sol tá estalando! 🥩"],
            ameno: ["Temperatura de shopping. Chique! ✨", "Nem frio, nem calor. Perfeito! 😎"],
            chuvoso: ["Dia de cosplay de pinto molhado 🌂", "Cai a água! Peça um delivery 🍕"],
            frio: ["Onde o Wi-Fi congela... 🥶", "Tira o casaco do armário! 🧥"]
        };

        function toggleView() {
            const container = document.getElementById('container');
            container.classList.toggle('show-list');
            if(container.classList.contains('show-list')) renderCityList();
        }

        async function getWeatherData(city) {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&lang=pt_br&appid=${OWM_API_KEY}`);
                return await res.json();
            } catch (e) { return null; }
        }

        async function updateDetails(city) {
            const data = await getWeatherData(city);
            if(!data || data.cod !== 200) return;

            document.getElementById('detCity').innerText = data.name;
            document.getElementById('detTemp').innerText = `${Math.round(data.main.temp)}°`;
            document.getElementById('detCond').innerText = data.weather[0].description;
            document.getElementById('detMin').innerText = `${Math.round(data.main.temp_min)}°`;
            document.getElementById('detMax').innerText = `${Math.round(data.main.temp_max)}°`;
            document.getElementById('detFeels').innerText = `${Math.round(data.main.feels_like)}°`;
            document.getElementById('detHum').innerText = `${data.main.humidity}%`;
            document.getElementById('detWind').innerHTML = `${Math.round(data.wind.speed * 3.6)} <small>km/h</small>`;

            let q = funnyQuotes.ameno;
            if(data.main.temp > 28) q = funnyQuotes.ensolarado;
            if(data.main.temp < 15) q = funnyQuotes.frio;
            if(data.weather[0].main === 'Rain') q = funnyQuotes.chuvoso;
            document.getElementById('detQuote').innerText = `"${q[Math.floor(Math.random()*q.length)]}"`;
            
            // Muda fundo baseado na hora
            const hr = new Date().getHours();
            document.getElementById('container').style.background = (hr > 18 || hr < 6) ? 'var(--bg-night)' : 'var(--bg-sunny)';
        }

        function removeCity(e, city) {
            e.stopPropagation(); // Não abre a cidade ao clicar no X
            savedCities = savedCities.filter(c => c !== city);
            localStorage.setItem('weatherCities', JSON.stringify(savedCities));
            renderCityList();
        }

        async function renderCityList() {
            const container = document.getElementById('citiesListContainer');
            container.innerHTML = '';
            
            for(let city of savedCities) {
                const data = await getWeatherData(city);
                if(!data || data.cod !== 200) continue;

                const card = document.createElement('div');
                card.className = 'city-card';
                card.onclick = () => { updateDetails(city); toggleView(); };
                
                // Muda fundo do card baseado no clima da cidade
                if(data.main.temp < 15) card.style.background = 'var(--bg-night)';

                card.innerHTML = `
                    <button class="delete-btn" onclick="removeCity(event, '${city}')">×</button>
                    <div class="info">
                        <h2>${data.name}</h2>
                        <p>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        <p style="margin-top:8px; text-transform: capitalize;">${data.weather[0].description}</p>
                    </div>
                    <div class="temp">${Math.round(data.main.temp)}°</div>
                `;
                container.appendChild(card);
            }
        }

        document.getElementById('citySearch').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const city = e.target.value.trim();
                if(city && !savedCities.includes(city)) {
                    savedCities.push(city);
                    localStorage.setItem('weatherCities', JSON.stringify(savedCities));
                    e.target.value = '';
                    renderCityList();
                }
            }
        });

        updateDetails('Vinhedo');
    </script>
</body>
</html>
